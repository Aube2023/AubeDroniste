<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- cadre -->
  <rect x="1" y="1" width="62" height="62" rx="3" stroke="#e0a23c" stroke-width="1.4"/>

  <!-- rose des vents : cercle extérieur très fin -->
  <circle cx="32" cy="32" r="22" stroke="#3a4256" stroke-width=".6"/>
  <circle cx="32" cy="32" r="18" stroke="#3a4256" stroke-width=".4" stroke-dasharray="1 2"/>

  <!-- aiguille de cap N -->
  <path d="M32 12 L29.5 32 L32 28 L34.5 32 Z" fill="#e0a23c"/>
  <path d="M32 52 L29.5 32 L32 36 L34.5 32 Z" fill="#ede4d2" opacity=".4"/>

  <!-- N -->
  <text x="32" y="9" text-anchor="middle"
        font-family="Inter, system-ui, sans-serif" font-size="6" font-weight="700"
        fill="#e0a23c">N</text>

  <!-- drone quadrirotor stylisé au centre -->
  <g stroke="#ede4d2" stroke-width="1.6" stroke-linecap="round">
    <line x1="24" y1="24" x2="40" y2="40"/>
    <line x1="40" y1="24" x2="24" y2="40"/>
  </g>
  <g fill="#0a0d14" stroke="#ede4d2" stroke-width="1.2">
    <circle cx="24" cy="24" r="2.6"/>
    <circle cx="40" cy="24" r="2.6"/>
    <circle cx="24" cy="40" r="2.6"/>
    <circle cx="40" cy="40" r="2.6"/>
  </g>

  <!-- corps central -->
  <rect x="29" y="29" width="6" height="6" rx="1" fill="#e0a23c"/>
</svg>
